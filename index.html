<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warrior Color Customizer</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="container">
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
        </div>
        <div id="controls">
            <h1>Warrior Customizer</h1>
            <p>Change the colors of the warrior's gear. Each control targets a specific color channel from the original image.</p>
            <div class="slider-control">
                <label for="threshold-slider">Color Match Leniency</label>
                <input type="range" id="threshold-slider" min="0.0" max="1.0" step="0.01" value="0.4">
                <span id="threshold-value">0.40</span>
            </div>
            <div class="color-control">
                <label for="color-red">Chestplate/Shoulders</label>
                <input type="color" id="color-red" value="#FF0000">
            </div>
            <div class="color-control">
                <label for="color-green">Boots/Greaves</label>
                <input type="color" id="color-green" value="#00FF00">
            </div>
            <div class="color-control">
                <label for="color-blue">Gauntlets</label>
                <input type="color" id="color-blue" value="#0000FF">
            </div>
            <div class="color-control">
                <label for="color-yellow">Helmet</label>
                <input type="color" id="color-yellow" value="#FFFF00">
            </div>
            <div class="color-control">
                <label for="color-cyan">Weapon Blade</label>
                <input type="color" id="color-cyan" value="#00FFFF">
            </div>
            <div class="color-control">
                <label for="color-magenta">Weapon Runes</label>
                <input type="color" id="color-magenta" value="#FF00FF">
            </div>
            <div class="color-control">
                <label for="color-white">Skin</label>
                <input type="color" id="color-white" value="#FFFFFF">
            </div>
            <div class="color-control">
                <label for="color-black">Outlines</label>
                <input type="color" id="color-black" value="#000000">
            </div>
        </div>
    </div>
    <script type="module" src="main.js"></script>

</body>
</html>
